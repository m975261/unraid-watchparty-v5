services:
  watchparty-v5:
    image: muaeabudhabi/watchparty-v5:latest
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: 'true'
      org.titan.app: watchparty-v5
    environment:
    - NODE_ENV=production
    - LOG_LEVEL=info
    - PUID=99
    - PGID=100
    - UMASK=022
    - DATABASE_URL=postgresql://watchparty-v5:changeme@watchparty-v5_postgres:5432/watchparty-v5
    - REDIS_URL=redis://watchparty-v5_redis:6379
    volumes:
    - /mnt/user/appdata/watchparty-v5/data:/data
    - /mnt/user/appdata/watchparty-v5/config:/config
    logging:
      driver: json-file
      options: &id001
        max-size: 10m
        max-file: '3'
    networks:
    - watchparty-v5_net
    depends_on:
      watchparty-v5_postgres:
        condition: service_healthy
      watchparty-v5_redis:
        condition: service_healthy
  watchparty-v5_postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
    - POSTGRES_DB=watchparty-v5
    - POSTGRES_USER=watchparty-v5
    - POSTGRES_PASSWORD=changeme
    volumes:
    - watchparty-v5_postgres_data:/var/lib/postgresql/data
    networks:
    - watchparty-v5_net
    logging:
      driver: json-file
      options: *id001
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${POSTGRES_USER:-app}
      interval: 30s
      timeout: 5s
      retries: 5
  watchparty-v5_redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment: []
    volumes:
    - watchparty-v5_redis_data:/data
    networks:
    - watchparty-v5_net
    logging:
      driver: json-file
      options: *id001
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 30s
      timeout: 5s
      retries: 5
networks:
  watchparty-v5_net:
    driver: bridge
volumes:
  watchparty-v5_data:
    driver: local
  watchparty-v5_postgres_data:
    driver: local
  watchparty-v5_redis_data:
    driver: local
